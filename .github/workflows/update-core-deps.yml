name: Update core dependencies
on:
  workflow_dispatch: null
  schedule:
    # https://crontab.guru/#5_8_*_*_*
    - cron: "5 8 * * *"

permissions:
  contents: read
  id-token: write

# Conditional runs
# https://stackoverflow.com/a/61832535/2460034
jobs:
  update-webref:
    runs-on: ubuntu-latest
    environment:
      name: azure
      deployment: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      # Use ncu to detect major version changes
      - run: npm i -g npm-check-updates
      - run: ncu -u @mdn* @webref*
      - run: npm i
      - run: git restore package.json
      # package-lock wants to remember the original version numbers of package.json
      # This prevents annoying change when contributors run `npm i` on their local machine.
      # Example: https://github.com/microsoft/TypeScript-DOM-lib-generator/pull/1463
      - run: npm i
      - name: Update MDN Data
        run: node scripts/fetch-mdn.js
      - id: build
        run: npm run generate
        continue-on-error: true
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Create GitHub App token
        id: app-token
        uses: microsoft/create-github-app-token-via-key-vault@5ba0d436e9c3cac52feff4d1f2f66f9698ce4a2d # v1
        with:
          client-id: ${{ vars.TYPESCRIPT_AUTOMATION_GITHUB_APP_CLIENT_ID }}
          key-id: ${{ vars.TYPESCRIPT_AUTOMATION_GITHUB_APP_KEY_ID }}
          owner: microsoft
          repositories: TypeScript-DOM-lib-generator
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
      - if: ${{ steps.build.outcome == 'failure' }}
        run: node deploy/onUpdateFailure.js
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - id: git-diff
        run: git diff --quiet HEAD baselines
        continue-on-error: true
      - uses: peter-evans/create-pull-request@v8
        if: ${{ steps.git-diff.outcome == 'failure' }}
        with:
          commit-message: "🤖 Update core dependencies"
          title: "Update core dependencies"
          author: "typescript-automation[bot] <290192711+typescript-automation[bot]@users.noreply.github.com>"
          committer: "typescript-automation[bot] <290192711+typescript-automation[bot]@users.noreply.github.com>"
          branch: update-core-deps
          token: ${{ steps.app-token.outputs.token }}
